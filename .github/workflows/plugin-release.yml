name: Build and Release Plugin

on:
  push:
    tags:
      - 'plugin-*-v*'
  workflow_dispatch:
    inputs:
      plugin_name:
        description: Plugin slug, for example `parakeet`
        required: true
        type: string
      plugin_version:
        description: Plugin version, for example `1.2.1`
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    concurrency:
      group: plugin-release-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - name: Parse tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PLUGIN_NAME="${{ inputs.plugin_name }}"
            PLUGIN_VERSION="${{ inputs.plugin_version }}"
            TAG="plugin-${PLUGIN_NAME}-v${PLUGIN_VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            # Extract plugin name and version from tag: plugin-qwen3-v1.0.0
            PLUGIN_NAME=$(echo "$TAG" | sed 's/^plugin-//' | sed 's/-v[0-9].*//')
            PLUGIN_VERSION=$(echo "$TAG" | sed 's/.*-v//')
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "PLUGIN_NAME=$PLUGIN_NAME" >> $GITHUB_ENV
          echo "PLUGIN_VERSION=$PLUGIN_VERSION" >> $GITHUB_ENV
          echo "Plugin: $PLUGIN_NAME, Version: $PLUGIN_VERSION, Tag: $TAG"

      - name: Resolve target name
        run: |
          # Map plugin name to Xcode target
          case "$PLUGIN_NAME" in
            qwen3) TARGET="Qwen3Plugin" ;;
            linear) TARGET="LinearPlugin" ;;
            webhook) TARGET="WebhookPlugin" ;;
            groq) TARGET="GroqPlugin" ;;
            openai) TARGET="OpenAIPlugin" ;;
            gemini) TARGET="GeminiPlugin" ;;
            whisperkit) TARGET="WhisperKitPlugin" ;;
            parakeet) TARGET="ParakeetPlugin" ;;
            gemma4) TARGET="Gemma4Plugin" ;;
            speechanalyzer) TARGET="SpeechAnalyzerPlugin" ;;
            openai-compatible) TARGET="OpenAICompatiblePlugin" ;;
            voxtral) TARGET="VoxtralPlugin" ;;
            deepgram) TARGET="DeepgramPlugin" ;;
            assemblyai) TARGET="AssemblyAIPlugin" ;;
            obsidian) TARGET="ObsidianPlugin" ;;
            script) TARGET="ScriptPlugin" ;;
            livetranscript) TARGET="LiveTranscriptPlugin" ;;
            granite) TARGET="GranitePlugin" ;;
            cloudflare-asr) TARGET="CloudflareASRPlugin" ;;
            file-memory) TARGET="FileMemoryPlugin" ;;
            openai-vector-memory) TARGET="OpenAIVectorMemoryPlugin" ;;
            fireworks) TARGET="FireworksPlugin" ;;
            gladia) TARGET="GladiaPlugin" ;;
            elevenlabs) TARGET="ElevenLabsPlugin" ;;
            claude) TARGET="ClaudePlugin" ;;
            cerebras) TARGET="CerebrasPlugin" ;;
            openrouter) TARGET="OpenRouterPlugin" ;;
            soniox) TARGET="SonioxPlugin" ;;
            cohere) TARGET="CoherePlugin" ;;
            speechmatics) TARGET="SpeechmaticsPlugin" ;;
            *) echo "Unknown plugin: $PLUGIN_NAME" && exit 1 ;;
          esac
          # Set deployment target and Swift embedding per plugin
          # All plugins use Xcode 26.2 (mlx-audio-swift requires Swift 6.2 for package resolution,
          # and workspace-state.json v7 from Xcode 26.2 is incompatible with Xcode 16.2)
          # - SpeechAnalyzer: macOS 26 deployment target
          # - Qwen3/Voxtral/Granite/Gemma4: macOS 14 + embed Swift compat libs (MLX uses Swift 6.2 features)
          # - All others: macOS 14, no compat libs needed (simple Foundation/SDK code)
          EMBED_SWIFT_LIBS="NO"
          XCODE_VERSION="26.2"
          if [ "$TARGET" = "SpeechAnalyzerPlugin" ]; then
            DEPLOY_TARGET="26.0"
          elif [ "$TARGET" = "Qwen3Plugin" ] || [ "$TARGET" = "VoxtralPlugin" ] || [ "$TARGET" = "GranitePlugin" ] || [ "$TARGET" = "Gemma4Plugin" ]; then
            DEPLOY_TARGET="14.0"
            EMBED_SWIFT_LIBS="YES"
          else
            DEPLOY_TARGET="14.0"
          fi
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "DEPLOY_TARGET=$DEPLOY_TARGET" >> $GITHUB_ENV
          echo "XCODE_VERSION=$XCODE_VERSION" >> $GITHUB_ENV
          echo "EMBED_SWIFT_LIBS=$EMBED_SWIFT_LIBS" >> $GITHUB_ENV
          echo "Target: $TARGET (macOS $DEPLOY_TARGET, Xcode $XCODE_VERSION, embed=$EMBED_SWIFT_LIBS)"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project TypeWhisper.xcodeproj \
            -scheme TypeWhisper

      - name: Patch manifest version
        run: |
          # Find the manifest.json for this plugin target
          MANIFEST=$(find Plugins -name manifest.json -path "*${TARGET}*" 2>/dev/null | head -1)
          if [ -z "$MANIFEST" ]; then
            # Fallback: search by plugin name
            MANIFEST=$(find Plugins -name manifest.json | head -1)
          fi
          if [ -n "$MANIFEST" ]; then
            python3 -c "
          import json
          with open('$MANIFEST', 'r') as f:
              m = json.load(f)
          m['version'] = '$PLUGIN_VERSION'
          with open('$MANIFEST', 'w') as f:
              json.dump(m, f, indent=4)
              f.write('\n')
          "
            echo "Patched $MANIFEST to version $PLUGIN_VERSION"
            cat "$MANIFEST"
          else
            echo "Warning: No manifest.json found"
          fi

      - name: Build Plugin
        run: |
          EXTRA_SETTINGS=""
          if [ "$EMBED_SWIFT_LIBS" = "YES" ]; then
            # Embed Swift compat libs (libswiftCompatibilitySpan.dylib) in plugin bundle
            # and add @loader_path/../Frameworks to rpath so they are found on macOS 15
            EXTRA_SETTINGS="ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES LD_RUNPATH_SEARCH_PATHS=@loader_path/../Frameworks"
          fi
          xcodebuild -project TypeWhisper.xcodeproj \
            -target "$TARGET" \
            -configuration Release \
            SYMROOT="$(pwd)/build" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=2D8ALY3LCL \
            MACOSX_DEPLOYMENT_TARGET="$DEPLOY_TARGET" \
            MARKETING_VERSION="$PLUGIN_VERSION" \
            $EXTRA_SETTINGS

      - name: Import Signing Certificate
        env:
          MACOS_SIGNING_P12: ${{ secrets.MACOS_SIGNING_P12 }}
          MACOS_SIGNING_PASSWORD: ${{ secrets.MACOS_SIGNING_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/plugin-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$MACOS_SIGNING_P12" | base64 --decode > /tmp/cert.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$MACOS_SIGNING_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Sign Plugin
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          BUNDLE_PATH="build/Release/${TARGET}.bundle"
          find "$BUNDLE_PATH" -name '._*' -delete
          xattr -cr "$BUNDLE_PATH"
          codesign --force --deep --options runtime --timestamp \
            --sign "$MACOS_SIGNING_IDENTITY" \
            "$BUNDLE_PATH"
          codesign --verify --deep --strict --verbose=2 "$BUNDLE_PATH"

      - name: Create ZIP
        run: |
          cd build/Release
          ditto -c -k --keepParent "${TARGET}.bundle" "${TARGET}.zip"
          ZIP_SIZE=$(stat -f%z "${TARGET}.zip")
          echo "ZIP_SIZE=$ZIP_SIZE" >> $GITHUB_ENV
          echo "ZIP size: $ZIP_SIZE bytes"

      - name: Cleanup Signing Assets
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -f /tmp/cert.p12

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET="build/Release/${TARGET}.zip"

          gh release create "$TAG" "$ASSET" \
            --target "$GITHUB_SHA" \
            --title "${TARGET} v${PLUGIN_VERSION}" \
            --notes ""

      - name: Update plugins.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DOWNLOAD_URL="https://github.com/TypeWhisper/typewhisper-mac/releases/download/${TAG}/${TARGET}.zip"
          MANIFEST_PATH=$(find Plugins -name manifest.json -path "*${TARGET}*" 2>/dev/null | head -1)

          git fetch origin gh-pages
          git worktree add -B gh-pages /tmp/gh-pages origin/gh-pages

          update_registry() {
            cd /tmp/gh-pages
            git fetch origin gh-pages
            git reset --hard origin/gh-pages

            python3 << PYEOF
          import json, sys, os

          with open("/tmp/gh-pages/plugins.json", "r") as f:
              registry = json.load(f)

          plugin_name = "$PLUGIN_NAME"
          version = "$PLUGIN_VERSION"
          size = int("$ZIP_SIZE")
          download_url = "$DOWNLOAD_URL"
          manifest_path = "$MANIFEST_PATH"

          updated = False
          for plugin in registry["plugins"]:
              if plugin_name in plugin["id"]:
                  plugin["version"] = version
                  plugin["size"] = size
                  plugin["downloadURL"] = download_url
                  updated = True
                  print(f"Updated {plugin['id']} to v{version}")
                  break

          if not updated:
              # Read manifest.json to create a new registry entry
              src_manifest = os.path.join("$GITHUB_WORKSPACE", manifest_path) if manifest_path else ""
              if src_manifest and os.path.exists(src_manifest):
                  with open(src_manifest) as mf:
                      manifest = json.load(mf)
                  new_entry = {
                      "id": manifest["id"],
                      "name": manifest["name"],
                      "version": version,
                      "minHostVersion": manifest.get("minHostVersion", "0.9.0"),
                      "author": manifest.get("author", "TypeWhisper"),
                      "description": manifest.get("description", ""),
                      "descriptions": manifest.get("descriptions", {}),
                      "category": manifest.get("category", "utility"),
                      "size": size,
                      "downloadURL": download_url
                  }
                  if manifest.get("minOSVersion"):
                      new_entry["minOSVersion"] = manifest["minOSVersion"]
                  if manifest.get("iconSystemName"):
                      new_entry["iconSystemName"] = manifest["iconSystemName"]
                  if manifest.get("requiresAPIKey"):
                      new_entry["requiresAPIKey"] = manifest["requiresAPIKey"]
                  registry["plugins"].append(new_entry)
                  print(f"Added new plugin {manifest['id']} v{version}")
              else:
                  print(f"Warning: No manifest found at {src_manifest}")
                  sys.exit(0)

          with open("/tmp/gh-pages/plugins.json", "w") as f:
              json.dump(registry, f, indent=2)
              f.write("\n")
          PYEOF

            git add plugins.json
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git diff --cached --quiet || git commit -m "Update ${TARGET} to v${PLUGIN_VERSION}"
            git push origin gh-pages
          }

          # Retry up to 5 times to handle concurrent pushes
          for i in 1 2 3 4 5; do
            if update_registry; then
              echo "Successfully updated plugins.json (attempt $i)"
              break
            fi
            echo "Push failed (attempt $i), retrying in ${i}s..."
            sleep "$i"
          done
